<!doctype html>
<div class="field">
<label for="item-name">Item name</label>
<input id="item-name" name="name" type="text" required placeholder="Enter item name" />
</div>


<div class="field">
<label for="item-category">Category</label>
<select id="item-category" name="category" required>
<option value="">— choose —</option>
<option value="groceries">Groceries</option>
<option value="electronics">Electronics</option>
<option value="clothing">Clothing</option>
<option value="other">Other</option>
</select>
</div>


<div class="field small">
<label for="item-qty">Quantity</label>
<input id="item-qty" name="quantity" type="number" min="1" value="1" required />
</div>


<div class="field small">
<label for="item-price">Price (optional)</label>
<input id="item-price" name="price" type="text" inputmode="decimal" placeholder="e.g. 4.50" pattern="^\d+(\.\d{1,2})?$" />
</div>


<div class="actions">
<button type="submit">Add item</button>
<button type="reset">Clear</button>
</div>


<div id="form-errors" class="errors" aria-live="polite"></div>
</form>
</section>


<section class="controls">
<div class="search">
<input id="search-input" placeholder="Search by name..." />
</div>


<div id="filter-pills" class="pills">
<button class="pill active" data-cat="all">All</button>
<button class="pill" data-cat="groceries">Groceries</button>
<button class="pill" data-cat="electronics">Electronics</button>
<button class="pill" data-cat="clothing">Clothing</button>
<button class="pill" data-cat="other">Other</button>
</div>
</section>


<section class="list-section">
<ul id="item-list" class="items" aria-live="polite"></ul>
</section>


<section class="stats">
<h3>Stats</h3>
<div id="stats-output"></div>
</section>
</main>


<script src="app.js" defer></script>
</body>
</html>
