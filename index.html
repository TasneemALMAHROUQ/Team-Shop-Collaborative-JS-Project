<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Team Shop — Student A UI</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <h1>Team Shop</h1>
    <!-- Student A: Add tagline under the title -->
    <p class="tagline">Organize your shopping items easily and quickly.</p>

    <nav class="stats">
      <span id="totalCount">Total: 4</span>
      <span id="fruitCount">Fruit: 2</span>
      <span id="vegCount">Veg: 1</span>
      <span id="otherCount">Other: 1</span>
    </nav>
  </header>

  <main class="container">
    <!-- Student A: Items List -->
    <section class="card">
      <h2>Items</h2>
      <ul id="list" class="list">
        <li>🛒 Apple (fruit) — x3</li>
        <li>🛒 Banana (fruit) — x5</li>
        <li>🛒 Carrot (veg) — x2</li>
        <li>🛒 Bread (other) — x1</li>
      </ul>
      <p class="hint">Tip: click an item to toggle <strong>done</strong>.</p>
    </section>
  </main>

  <footer class="site-footer">
    <small>Team Shop — UI by Student A</small>
  </footer>

  <script src="app.js"></script>
</body>
</html>
